workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

stages:
  - verify
  - deploy

variables:
  BUN_VERSION: "1.3.12"
  RAILWAY_PROJECT_ID: "b1c0af70-e699-455f-a9dd-def24cd8e5be"
  RAILWAY_SERVICE_ID: "ff28ca07-f5e7-4328-a73f-f7a7c412fc53"
  RAILWAY_ENVIRONMENT: "production"

default:
  image: oven/bun:${BUN_VERSION}
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - apps/web/node_modules/
      - .bun/install/cache/
  before_script:
    - bun --version

verify:
  stage: verify
  script:
    - bun install --frozen-lockfile
    - bun run typecheck
    - bun run build

deploy:railway:
  stage: deploy
  image:
    name: node:22-bookworm
    docker:
      platform: linux/amd64
  before_script:
    - node --version
    - npm --version
  needs:
    - verify
  resource_group: railway-production
  environment:
    name: production
    url: https://boundary-web-production.up.railway.app
  script:
    - test -n "$RAILWAY_TOKEN"
    - test -n "$RAILWAY_PROJECT_ID"
    - test -n "$RAILWAY_SERVICE_ID"
    - npm install -g @railway/cli
    - railway up --project "$RAILWAY_PROJECT_ID" --service "$RAILWAY_SERVICE_ID" --environment "$RAILWAY_ENVIRONMENT" --detach
