name: Provider Proof Campaign

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Authorized Clinical Co-Pilot target URL
        required: true
        default: https://clinical-copilot.up.railway.app
      timeout_seconds:
        description: Per-run timeout seconds
        required: true
        default: "75"
      mint_synthetic_session:
        description: Mint synthetic SMART session with BOUNDARY_SMART_SESSION_SECRET
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  proof:
    name: Run provider-backed proof campaign
    runs-on: ubuntu-latest
    environment: demo
    env:
      BOUNDARY_ENABLE_LLM_AGENTS: "1"
      BOUNDARY_REQUIRED_LLM_PROVIDERS: openrouter
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_BASE_URL: ${{ vars.OPENROUTER_BASE_URL }}
      BOUNDARY_SMART_SESSION_SECRET: ${{ secrets.BOUNDARY_SMART_SESSION_SECRET }}
      BETTER_AUTH_URL: http://127.0.0.1:3000
      BETTER_AUTH_SECRET: boundary-labs-proof-workflow-secret-change-before-production
      BOUNDARY_OWNER_EMAIL: owner@example.com
      BOUNDARY_OPERATOR_EMAIL_ALLOWLIST: owner@example.com
      BAA_DOCUMENT_HASH: sha256:proof-placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install worker dependencies
        run: python -m pip install -r worker/requirements.txt

      - name: Validate proof runtime environment
        run: |
          check_args="--require-provider-proof"
          if [ "${{ inputs.mint_synthetic_session }}" = "true" ]; then
            check_args="$check_args --require-smart-secret"
          fi
          python scripts/check_runtime_env.py $check_args

      - name: Run proof campaign
        id: proof
        run: |
          extra_args=""
          if [ "${{ inputs.mint_synthetic_session }}" = "true" ]; then
            extra_args="--mint-synthetic-session"
          fi
          python scripts/run_proof_campaign.py \
            --bootstrap \
            --target-url "${{ inputs.target_url }}" \
            --timeout-seconds "${{ inputs.timeout_seconds }}" \
            --output-file proof-output.json \
            $extra_args
          artifact_path="$(python -c 'import json; print(json.load(open("proof-output.json"))["artifact"])')"
          sqlite_path="$(python -c 'import json; print(json.load(open("proof-output.json"))["sqlite_path"])')"
          target_origin="$(python -c 'import json; print(json.load(open("proof-output.json"))["target_origin"])')"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"
          echo "sqlite_path=$sqlite_path" >> "$GITHUB_OUTPUT"
          echo "target_origin=$target_origin" >> "$GITHUB_OUTPUT"

      - name: Run full verification gate
        run: pnpm verify:readiness -- --sqlite-path "${{ steps.proof.outputs.sqlite_path }}" --artifact-path "${{ steps.proof.outputs.artifact_path }}" --expected-target-origin "${{ steps.proof.outputs.target_origin }}"

      - name: Run readiness audit
        run: |
          set -o pipefail
          pnpm audit:readiness -- \
            --sqlite-path "${{ steps.proof.outputs.sqlite_path }}" \
            --artifact-path "${{ steps.proof.outputs.artifact_path }}" \
            --expected-target-origin "${{ steps.proof.outputs.target_origin }}" \
            | tee readiness-audit.json

      - name: Upload proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: boundary-provider-proof-campaign
          path: |
            ${{ steps.proof.outputs.artifact_path }}
            proof-output.json
            readiness-audit.json
