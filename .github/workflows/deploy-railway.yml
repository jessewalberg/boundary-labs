name: Deploy Railway

on:
  push:
    branches:
      - feat/architecture-deck
    paths:
      - ".github/workflows/deploy-railway.yml"
      - ".railwayignore"
      - "railway.toml"
      - "package.json"
      - "bun.lock"
      - "apps/web/**"
  workflow_dispatch:

concurrency:
  group: railway-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy boundary-web
    runs-on: ubuntu-latest
    environment: demo
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway configuration
        run: |
          test -n "$RAILWAY_TOKEN"
          test -n "$RAILWAY_PROJECT_ID"
          test -n "$RAILWAY_SERVICE_ID"

      - name: Deploy to Railway
        run: >
          railway up
          --project "$RAILWAY_PROJECT_ID"
          --service "$RAILWAY_SERVICE_ID"
          --environment "$RAILWAY_ENVIRONMENT"
          --detach
