name: Deploy Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: railway-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy boundary-web
    runs-on: ubuntu-latest
    environment: demo
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate policy seed and migrations
        env:
          SQLITE_PATH: ${{ runner.temp }}/boundary-policy-check.db
          BOUNDARY_ARTIFACT_DIR: ${{ runner.temp }}/boundary-artifacts
          BOUNDARY_OWNER_EMAIL: owner@example.com
          BETTER_AUTH_SECRET: boundary-labs-deploy-validation-secret
        run: pnpm --dir apps/web exec tsx src/server/db/migrate.ts

      - name: Docker build preflight
        run: docker build -t boundary-labs-deploy .

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway configuration
        run: |
          test -n "$RAILWAY_TOKEN"
          test -n "$RAILWAY_PROJECT_ID"
          test -n "$RAILWAY_SERVICE_ID"

      - name: Validate Railway provider proof environment
        run: >
          railway run
          --project "$RAILWAY_PROJECT_ID"
          --service "$RAILWAY_SERVICE_ID"
          --environment "$RAILWAY_ENVIRONMENT"
          --
          python scripts/check_runtime_env.py
          --require-provider-proof
          --require-smart-secret

      - name: Deploy to Railway
        run: >
          railway up
          --project "$RAILWAY_PROJECT_ID"
          --service "$RAILWAY_SERVICE_ID"
          --environment "$RAILWAY_ENVIRONMENT"
          --detach
